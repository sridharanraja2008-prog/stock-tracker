<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Stock Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #222; }

    header { background: #fff; padding: 14px 24px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1rem; font-weight: 700; color: #2563eb; }
    .add-row { display: flex; gap: 8px; }
    .add-row input { padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 7px; font-size: 0.875rem; width: 220px; outline: none; }
    .add-row input:focus { border-color: #2563eb; }
    .add-row button { padding: 8px 18px; background: #2563eb; color: #fff; border: none; border-radius: 7px; font-weight: 600; cursor: pointer; }

    .wrapper { display: flex; height: calc(100vh - 53px); }

    /* SIDEBAR */
    .sidebar { width: 160px; background: #fff; border-right: 1px solid #e0e0e0; overflow-y: auto; }
    .sb-head { padding: 10px 14px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #aaa; border-bottom: 1px solid #f0f0f0; }
    .sb-item { padding: 11px 14px; cursor: pointer; border-left: 3px solid transparent; border-bottom: 1px solid #f5f5f5; }
    .sb-item:hover { background: #f9fafb; }
    .sb-item.active { border-left-color: #2563eb; background: #eff6ff; }
    .sb-sym  { font-weight: 700; font-size: 0.88rem; color: #2563eb; }
    .sb-name { font-size: 0.7rem; color: #aaa; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* MAIN */
    .main { flex: 1; overflow-y: auto; padding: 20px; }

    #empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #aaa; flex-direction: column; gap: 10px; }
    #empty span { font-size: 2.5rem; }

    /* STOCK CARD */
    .card { background: #fff; border-radius: 10px; padding: 18px 20px; margin-bottom: 14px; border: 1px solid #e0e0e0; }
    .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .c-sym  { font-size: 1.3rem; font-weight: 800; }
    .c-name { font-size: 0.82rem; color: #999; }
    .c-price { font-size: 1.6rem; font-weight: 800; text-align: right; }
    .c-chg  { font-size: 0.85rem; font-weight: 600; text-align: right; margin-top: 2px; }
    .up   { color: #16a34a; }
    .down { color: #dc2626; }
    .card-btns { display: flex; gap: 8px; margin-top: 12px; }
    .btn-ref { padding: 6px 14px; background: #f0f2f5; border: 1px solid #e0e0e0; border-radius: 7px; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
    .btn-ref:hover { border-color: #2563eb; color: #2563eb; }
    .btn-del { padding: 6px 14px; background: #fff0f0; border: 1px solid #fca5a5; border-radius: 7px; font-size: 0.8rem; font-weight: 600; color: #dc2626; cursor: pointer; }
    .btn-del:hover { background: #dc2626; color: #fff; }

    /* CHART */
    .chart-card { background: #fff; border-radius: 10px; padding: 16px 20px; border: 1px solid #e0e0e0; margin-bottom: 14px; }
    .chart-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #aaa; margin-bottom: 12px; }

    /* TABLE */
    .tbl-card { background: #fff; border-radius: 10px; border: 1px solid #e0e0e0; overflow: hidden; }
    .tbl-title { padding: 12px 16px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #aaa; border-bottom: 1px solid #f0f0f0; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th { text-align: left; padding: 9px 12px; font-size: 0.68rem; text-transform: uppercase; color: #aaa; background: #fafafa; border-bottom: 1px solid #f0f0f0; }
    td { padding: 9px 12px; border-bottom: 1px solid #f5f5f5; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    /* LOADER */
    #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.85); align-items: center; justify-content: center; flex-direction: column; gap: 10px; z-index: 999; }
    .spin { width: 30px; height: 30px; border: 3px solid #e0e0e0; border-top-color: #2563eb; border-radius: 50%; animation: s 0.7s linear infinite; }
    @keyframes s { to { transform: rotate(360deg); } }
    #loader p { font-size: 0.85rem; color: #999; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <h1>📈 Stock Tracker</h1>
  <div class="add-row">
    <input id="sym" type="text" placeholder="Symbol  e.g. AAPL, TCS.NS" />
    <button onclick="addStock()">+ Track</button>
  </div>
</header>

<div class="wrapper">
  <div class="sidebar">
    <div class="sb-head">Watching</div>
    <div id="sb-list"></div>
  </div>

  <div class="main">
    <div id="empty">
      <span>📊</span>
      <p>Add a stock symbol to start tracking</p>
    </div>

    <div id="panel" style="display:none">
      <!-- INFO -->
      <div class="card">
        <div class="card-head">
          <div>
            <div class="c-sym"  id="p-sym"></div>
            <div class="c-name" id="p-name"></div>
          </div>
          <div>
            <div class="c-price" id="p-price"></div>
            <div class="c-chg"   id="p-chg"></div>
          </div>
        </div>
        <div class="card-btns">
          <button class="btn-ref" onclick="refresh()">↻ Refresh</button>
          <button class="btn-del" onclick="remove()">✕ Remove</button>
        </div>
      </div>

      <!-- CHART -->
      <div class="chart-card">
        <div class="chart-title">Last 10 Days — Closing Price</div>
        <canvas id="chart" height="80"></canvas>
      </div>

      <!-- TABLE -->
      <div class="tbl-card">
        <div class="tbl-title">Last 10 Days — Price Data</div>
        <table>
          <thead><tr><th>Date</th><th>Open</th><th>High</th><th>Low</th><th>Close</th><th>Volume</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="loader"><div class="spin"></div><p id="ltxt">Loading...</p></div>

<script src="app.js"></script>
</body>
</html>
